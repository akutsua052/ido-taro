<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>どん底井戸太郎</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",system-ui,sans-serif;color:#d8eaff;background:#04060a}

#bg{position:fixed;inset:0;z-index:0;background-image:url("haikeido.png");background-size:cover;background-position:center}
#bg-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 90% 70% at 50% 55%,transparent 15%,rgba(2,4,12,0.45) 65%,rgba(0,0,0,0.78) 100%),
  linear-gradient(to bottom,rgba(0,0,0,0.65) 0%,transparent 18%,transparent 72%,rgba(0,0,0,0.55) 100%)}
#fx-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}

/* コーナー */
.corner{position:fixed;z-index:20;width:56px;height:56px;pointer-events:none}
.corner.tl{top:0;left:0;border-top:1px solid rgba(100,180,255,0.35);border-left:1px solid rgba(100,180,255,0.35)}
.corner.tr{top:0;right:0;border-top:1px solid rgba(100,180,255,0.35);border-right:1px solid rgba(100,180,255,0.35)}
.corner.bl{bottom:0;left:0;border-bottom:1px solid rgba(100,180,255,0.35);border-left:1px solid rgba(100,180,255,0.35)}
.corner.br{bottom:0;right:0;border-bottom:1px solid rgba(100,180,255,0.35);border-right:1px solid rgba(100,180,255,0.35)}
.corner::before,.corner::after{content:"";position:absolute;background:rgba(100,180,255,0.5)}
.corner.tl::before{top:12px;left:-1px;width:1px;height:8px}.corner.tl::after{top:-1px;left:12px;width:8px;height:1px}
.corner.tr::before{top:12px;right:-1px;width:1px;height:8px}.corner.tr::after{top:-1px;right:12px;width:8px;height:1px}
.corner.bl::before{bottom:12px;left:-1px;width:1px;height:8px}.corner.bl::after{bottom:-1px;left:12px;width:8px;height:1px}
.corner.br::before{bottom:12px;right:-1px;width:1px;height:8px}.corner.br::after{bottom:-1px;right:12px;width:8px;height:1px}

/* 上部バー */
#top-bar{position:fixed;top:0;left:0;right:0;height:54px;z-index:30;display:flex;align-items:center;padding:0 22px;gap:14px;background:linear-gradient(to bottom,rgba(2,6,16,0.88),rgba(2,6,16,0));border-bottom:1px solid rgba(80,160,255,0.1)}
#top-title{font-size:15px;font-weight:700;letter-spacing:0.14em;color:#7dc8ff;text-shadow:0 0 18px rgba(80,180,255,0.55)}
#top-sub{font-size:10px;color:rgba(140,190,255,0.45);letter-spacing:0.12em}
.orn{width:22px;height:1px;flex-shrink:0;background:linear-gradient(to right,transparent,rgba(80,160,255,0.5))}
.orn.r{background:linear-gradient(to left,transparent,rgba(80,160,255,0.5))}
#mood-wrap{margin-left:auto;display:flex;align-items:center;gap:8px}
.mdot{width:6px;height:6px;border-radius:50%;background:#3a8aff;box-shadow:0 0 8px rgba(58,138,255,0.9);animation:mpulse 2.4s ease-in-out infinite}
@keyframes mpulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.35)}}
#mood-txt{font-size:11px;color:rgba(120,180,255,0.6);letter-spacing:0.06em}

/* ゲームメニューボタン群 */
#game-menu{position:fixed;top:14px;right:20px;z-index:35;display:flex;gap:7px}
.gmenu-btn{padding:6px 12px;border-radius:11px;border:1px solid rgba(100,200,255,0.22);background:rgba(6,14,30,0.78);color:#9dd8ff;font-size:11px;cursor:pointer;backdrop-filter:blur(12px);transition:background .15s;white-space:nowrap}
.gmenu-btn:hover{background:rgba(20,50,100,0.85)}

/* サイド */
#side-l{position:fixed;left:14px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.sbar{width:2px;border-radius:2px}
.sbar:nth-child(1){height:64px;background:linear-gradient(to bottom,transparent,rgba(60,130,255,0.5),transparent)}
.sbar:nth-child(2){height:42px;margin-left:5px;background:linear-gradient(to bottom,transparent,rgba(60,130,255,0.35),transparent)}
.sbar:nth-child(3){height:80px;margin-left:10px;background:linear-gradient(to bottom,transparent,rgba(60,130,255,0.2),transparent)}
#side-txt{position:fixed;left:24px;top:50%;transform:translateY(-50%) rotate(-90deg);z-index:20;font-size:9px;letter-spacing:0.22em;color:rgba(80,160,255,0.3);pointer-events:none;white-space:nowrap}

/* キャラクター */
#char-wrap{position:fixed;width:240px;height:240px;z-index:10;pointer-events:none;will-change:transform;filter:drop-shadow(0 12px 18px rgba(0,0,0,0.38))}
#char-shadow-el{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:130px;height:20px;border-radius:50%;background:radial-gradient(ellipse,rgba(0,0,0,0.48),transparent 72%);filter:blur(6px);pointer-events:none}
#char-img-a,#char-img-b{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:200px;height:200px;object-fit:contain;mix-blend-mode:multiply;pointer-events:none;will-change:transform,opacity;image-rendering:auto}
#char-img-b{opacity:0}
#char-click-zone{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:180px;height:180px;border-radius:50%;cursor:pointer;z-index:11;background:transparent}
#zzz-fx{position:absolute;left:62%;top:8%;font-size:20px;pointer-events:none;opacity:0;z-index:12;text-shadow:0 0 10px rgba(120,180,255,0.6)}
#action-badge{position:fixed;left:50%;top:62px;transform:translateX(-50%);z-index:25;padding:5px 14px;border-radius:20px;border:1px solid rgba(100,200,255,0.18);background:rgba(4,10,22,0.72);color:rgba(160,220,255,0.75);font-size:11px;letter-spacing:0.08em;pointer-events:none;backdrop-filter:blur(10px);opacity:0;transition:opacity .4s}
#action-badge.show{opacity:1}

/* 吹き出し */
#bubble{position:absolute;left:50%;top:-10px;transform:translate(-50%,-100%) translateY(0px);z-index:40;max-width:min(72vw,380px);min-width:140px;padding:11px 15px;border-radius:16px;border:1px solid rgba(100,200,255,0.2);background:rgba(4,10,22,0.88);color:#c8e8ff;font-size:13px;line-height:1.65;pointer-events:none;opacity:0;transition:opacity 200ms ease,transform 200ms ease;backdrop-filter:blur(14px);box-shadow:0 0 28px rgba(40,120,255,0.1),inset 0 1px 0 rgba(255,255,255,0.06)}
#bubble.show{opacity:1;transform:translate(-50%,-100%) translateY(-10px)}
#bubble::after{content:"";position:absolute;left:50%;bottom:-9px;width:16px;height:16px;transform:translateX(-50%) rotate(45deg);background:rgba(4,10,22,0.88);border-right:1px solid rgba(100,200,255,0.2);border-bottom:1px solid rgba(100,200,255,0.2)}

/* クリックFX */
#click-fx{position:fixed;inset:0;z-index:15;pointer-events:none;overflow:hidden}
.cfx{position:absolute;width:36px;height:36px;border-radius:50%;transform:translate(-50%,-50%);border:1.5px solid rgba(80,180,255,0.85);animation:cfxA 680ms ease-out forwards}
@keyframes cfxA{0%{opacity:1;transform:translate(-50%,-50%) scale(0.25)}100%{opacity:0;transform:translate(-50%,-50%) scale(4.2)}}
.cfx2{position:absolute;width:7px;height:7px;border-radius:50%;transform:translate(-50%,-50%);background:rgba(130,210,255,0.95);box-shadow:0 0 10px rgba(80,180,255,0.8);animation:cfxB 380ms ease-out forwards}
@keyframes cfxB{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(0.1) translateY(-18px)}}
.drop{position:fixed;pointer-events:none;border-radius:50% 50% 60% 40%/50% 50% 70% 50%;background:rgba(80,160,255,0.15);border:1px solid rgba(100,190,255,0.2);animation:dropA linear forwards}
@keyframes dropA{0%{opacity:0.8;transform:scaleY(1)}100%{opacity:0;transform:scaleY(0.6) translateY(70px)}}

#status-line{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:20;font-size:11px;color:rgba(100,160,255,0.42);letter-spacing:0.08em;pointer-events:none;text-align:center;white-space:nowrap}

/* 入力 */
#composer{position:fixed;bottom:0;left:0;right:0;z-index:30;padding:12px 16px 16px}
#composer-inner{max-width:700px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px;border-radius:22px;border:1px solid rgba(60,120,255,0.18);background:rgba(3,7,18,0.82);backdrop-filter:blur(22px);box-shadow:0 -4px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04)}
#prompt-input{border:none;background:rgba(255,255,255,0.05);color:#c8e8ff;border-radius:14px;padding:12px 16px;font-size:14px;line-height:1.5;resize:none;min-height:48px;max-height:120px;outline:none;font-family:inherit}
#prompt-input::placeholder{color:rgba(100,160,255,0.32)}
#send-btn{align-self:stretch;min-width:86px;padding:0 16px;border:none;border-radius:14px;color:#02060e;font-weight:700;font-size:14px;cursor:pointer;background:linear-gradient(135deg,#5ab0ff,#7eeab0);transition:opacity .15s,transform .1s}
#send-btn:hover{opacity:0.87}#send-btn:active{transform:scale(0.97)}#send-btn:disabled{opacity:0.38;cursor:wait}

/* ════ 共通オーバーレイ ════ */
.game-overlay{position:fixed;inset:0;z-index:50;background:rgba(1,4,12,0.92);backdrop-filter:blur(20px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.game-overlay.active{display:flex}
.g-header{display:flex;align-items:center;gap:10px;width:100%;max-width:560px;padding:0 4px}
.g-title{font-size:16px;font-weight:700;letter-spacing:0.1em;color:#7dc8ff}
.g-info{font-size:12px;color:rgba(140,190,255,0.6);flex:1}
.g-close{padding:6px 14px;border-radius:10px;border:1px solid rgba(100,200,255,0.2);background:rgba(10,20,40,0.7);color:#9dd8ff;font-size:12px;cursor:pointer}
.g-close:hover{background:rgba(20,50,100,0.9)}
.g-btn{padding:7px 18px;border-radius:12px;border:1px solid rgba(100,200,255,0.2);background:rgba(10,22,48,0.7);color:#9dd8ff;font-size:12px;cursor:pointer}
.g-btn:hover{background:rgba(20,50,110,0.9)}
.g-msg{font-size:13px;color:rgba(160,220,255,0.65);letter-spacing:0.06em;min-height:20px;text-align:center;max-width:520px}

/* ════ 四川省 ════ */
#mahjong-board-wrap{position:relative}
#mahjong-board{display:grid;gap:5px;padding:14px;border-radius:18px;border:1px solid rgba(60,120,255,0.2);background:rgba(3,8,20,0.82)}
.tile{width:54px;height:54px;border-radius:10px;border:1px solid rgba(80,150,255,0.22);background:rgba(10,22,48,0.75);font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s,background .1s;user-select:none}
.tile:hover:not(.empty){background:rgba(20,50,100,0.85);border-color:rgba(100,180,255,0.45);transform:scale(1.06)}
.tile.selected{background:rgba(30,80,180,0.75);border-color:rgba(120,200,255,0.7);box-shadow:0 0 14px rgba(80,160,255,0.45);transform:scale(1.1)}
.tile.empty{cursor:default;background:rgba(5,10,22,0.4);border-color:rgba(40,80,160,0.1);pointer-events:none}
.tile.flash{animation:tileFlash .4s ease-out forwards}
@keyframes tileFlash{0%{background:rgba(80,200,255,0.55);transform:scale(1.18)}100%{background:rgba(5,10,22,0.4);transform:scale(1)}}
#mj-line-canvas{position:absolute;top:14px;left:14px;pointer-events:none}

/* ════ 苔キャッチ ════ */
#moss-canvas{border-radius:16px;border:1px solid rgba(60,120,255,0.2);background:rgba(3,8,20,0.92);display:block;cursor:none}
#moss-info{display:flex;gap:20px;font-size:13px;color:rgba(160,220,255,0.7)}
.moss-stat span{color:#7dc8ff;font-weight:700}

/* ════ 脱出クライミング ════ */
#climb-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:360px}
#climb-shaft{width:120px;height:300px;border-radius:10px;border:1px solid rgba(60,120,255,0.2);background:rgba(3,8,20,0.92);position:relative;overflow:hidden}
#climb-char{position:absolute;left:50%;transform:translateX(-50%);width:60px;height:60px;object-fit:contain;mix-blend-mode:multiply;transition:bottom .1s}
#climb-progress{position:absolute;bottom:0;left:0;right:0;background:rgba(60,120,255,0.15);transition:height .15s}
#climb-goal{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:18px}
#climb-btn{width:220px;padding:16px;border-radius:16px;border:none;font-size:18px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#5ab0ff,#7eeab0);color:#02060e;user-select:none;-webkit-user-select:none}
#climb-btn:active{transform:scale(0.97)}
#climb-stats{font-size:13px;color:rgba(160,220,255,0.7);text-align:center;line-height:1.8}

/* ════ ガラクタ鑑定 ════ */
#junk-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:380px}
#junk-item-box{width:180px;height:180px;border-radius:20px;border:1px solid rgba(60,120,255,0.2);background:rgba(3,8,20,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:64px;position:relative}
#junk-item-name{font-size:14px;color:rgba(160,220,255,0.8);text-align:center}
#junk-item-desc{font-size:11px;color:rgba(100,160,255,0.55);text-align:center;padding:0 8px}
#junk-choice{display:flex;gap:14px}
.junk-btn{width:120px;padding:12px;border-radius:14px;border:1px solid rgba(100,200,255,0.2);background:rgba(10,22,48,0.7);color:#9dd8ff;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.junk-btn:hover{background:rgba(20,50,110,0.9)}
#junk-result{font-size:24px;font-weight:700;min-height:36px;text-align:center}
#junk-collection{display:flex;flex-wrap:wrap;gap:6px;max-width:380px;justify-content:center;max-height:80px;overflow-y:auto}
.junk-badge{font-size:20px;padding:4px;border-radius:8px;background:rgba(10,22,48,0.7);border:1px solid rgba(60,120,255,0.2)}

/* ════ リズムゲーム ════ */
#rhythm-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:400px}
#rhythm-shaft{width:280px;height:320px;border-radius:16px;border:1px solid rgba(60,120,255,0.2);background:rgba(3,8,20,0.92);position:relative;overflow:hidden}
.r-drop{position:absolute;border-radius:50%;pointer-events:none}
#rhythm-hit-zone{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:200px;height:22px;border-radius:12px;border:2px solid rgba(100,200,255,0.4);background:rgba(60,120,255,0.1);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(100,160,255,0.4);letter-spacing:.1em}
#rhythm-btn{width:220px;padding:14px;border-radius:16px;border:none;font-size:16px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#5ab0ff,#7eeab0);color:#02060e}
#rhythm-btn:active{transform:scale(0.97)}
#rhythm-stats{font-size:13px;color:rgba(160,220,255,0.7);text-align:center;line-height:1.9}
#rhythm-echo{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:28px;pointer-events:none;opacity:0;z-index:60;text-shadow:0 0 20px rgba(120,200,255,0.9)}

/* ゲーム中ぼやき */
#taro-gc{position:fixed;bottom:80px;left:16px;z-index:55;max-width:190px;padding:9px 12px;border-radius:14px;border:1px solid rgba(80,160,255,0.18);background:rgba(4,10,22,0.84);color:rgba(160,210,255,0.75);font-size:11px;line-height:1.6;pointer-events:none;opacity:0;transition:opacity 300ms}
#taro-gc.show{opacity:1}
#taro-mini{position:fixed;bottom:114px;left:16px;z-index:54;width:50px;height:50px;object-fit:contain;mix-blend-mode:multiply;pointer-events:none;opacity:0;transition:opacity 300ms}
#taro-mini.show{opacity:1}

@media(max-width:600px){
  #side-l,#side-txt{display:none}
  #composer-inner{grid-template-columns:1fr}
  #send-btn{min-height:46px}
  .tile{width:44px;height:44px;font-size:20px}
  #moss-canvas{width:320px!important;height:280px!important}
}
</style>
</head>
<body>
<div id="bg"></div><div id="bg-overlay"></div>
<canvas id="fx-canvas"></canvas>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

<div id="top-bar">
  <div class="orn"></div><div id="top-title">どん底 井戸太郎</div><div class="orn r"></div>
  <div id="top-sub">WELL BOTTOM SPIRIT</div>
  <div id="mood-wrap"><div class="mdot"></div><div id="mood-txt">ネガティブ中</div></div>
</div>

<div id="game-menu">
  <button class="gmenu-btn" id="btn-mahjong">🧹 四川省</button>
  <button class="gmenu-btn" id="btn-moss">🌿 苔キャッチ</button>
  <button class="gmenu-btn" id="btn-climb">🪜 脱出</button>
  <button class="gmenu-btn" id="btn-junk">🔩 鑑定</button>
  <button class="gmenu-btn" id="btn-rhythm">💧 リズム</button>
</div>

<div id="side-l"><div class="sbar"></div><div class="sbar"></div><div class="sbar"></div></div>
<div id="side-txt">DEPTH : ∞</div>

<div id="action-badge">[ 通常観測中 ]</div>

<div id="char-wrap">
  <div id="bubble"></div>
  <div id="char-shadow-el"></div>
  <img id="char-img-a" src="syomen.png" alt="井戸太郎"/>
  <img id="char-img-b" src="syomen.png" alt=""/>
  <div id="char-click-zone"></div>
  <div id="zzz-fx">💤</div>
</div>

<div id="click-fx"></div>
<div id="status-line">クリックすると反応するんだな</div>

<div id="composer"><div id="composer-inner">
  <textarea id="prompt-input" rows="1" placeholder="井戸太郎に話しかける…"></textarea>
  <button id="send-btn" type="button">送信</button>
</div></div>

<!-- ════ 四川省 ════ -->
<div id="mahjong-overlay" class="game-overlay">
  <div class="g-header">
    <div class="g-title">🪣 どん底四川省</div>
    <div class="g-info">手数:<span id="mj-moves">40</span> ペア残:<span id="mj-pairs">12</span></div>
    <button class="g-btn" id="mj-hint">ヒント</button>
    <button class="g-btn" id="mj-reset">リセット</button>
    <button class="g-close" id="mj-close">✕</button>
  </div>
  <div id="mahjong-board-wrap"><canvas id="mj-line-canvas"></canvas><div id="mahjong-board"></div></div>
  <div class="g-msg" id="mj-msg">同じガラクタを2曲がり以内で結んで消すんだな。</div>
</div>

<!-- ════ 苔キャッチ ════ -->
<div id="moss-overlay" class="game-overlay">
  <div class="g-header">
    <div class="g-title">🌿 どん底！苔キャッチ</div>
    <div class="g-info" id="moss-info-txt"></div>
    <button class="g-btn" id="moss-start">スタート</button>
    <button class="g-close" id="moss-close">✕</button>
  </div>
  <canvas id="moss-canvas" width="400" height="360"></canvas>
  <div class="g-msg" id="moss-msg">左右キー or タップで移動。苔をキャッチ！石は避けるんだな。</div>
</div>

<!-- ════ 脱出クライミング ════ -->
<div id="climb-overlay" class="game-overlay">
  <div class="g-header">
    <div class="g-title">🪜 脱出！連打クライミング</div>
    <div class="g-info" id="climb-info"></div>
    <button class="g-close" id="climb-close">✕</button>
  </div>
  <div id="climb-wrap">
    <div id="climb-shaft">
      <div id="climb-progress"></div>
      <div id="climb-goal">🌟</div>
      <img id="climb-char" src="escape.png" alt="" style="bottom:10px"/>
    </div>
    <div id="climb-stats">最高到達: <b id="climb-best">0</b>m ／ 今回: <b id="climb-cur">0</b>m<br><span id="climb-status">ボタンを連打して登るんだな</span></div>
    <button id="climb-btn">👆 登る！</button>
  </div>
</div>

<!-- ════ ガラクタ鑑定 ════ -->
<div id="junk-overlay" class="game-overlay">
  <div class="g-header">
    <div class="g-title">🔩 ガラクタ鑑定</div>
    <div class="g-info">正解:<span id="junk-correct">0</span> 連続:<span id="junk-streak">0</span></div>
    <button class="g-close" id="junk-close">✕</button>
  </div>

];
const taroQ=["お腹空いたけど、ここは苔しかないんだな。","上からゴミが落ちてきた……僕へのプレゼントかもね。","明るいところは眩しすぎて、目が溶けちゃうんだな。","足元がじめじめしてて、落ち着くんだな。","誰も来ないのが一番いいんだな。","たまにカエルの鳴き声が聞こえる……羨ましいかもね。","僕の体、実は泥でできてるのかもしれないんだな。","太陽なんて、都市伝説だと思ってるんだな。","ここで一生を終えるのも、悪くないかもね。","さっきから見てるけど、暇なんだな。","期待されるのが一番苦手なんだな。","井戸の壁、1万枚目の石を見つけたんだな。","もちもちしてるのは、防御反応かもね。","声をかけられても、何も出ないんだな。","夢も希望も、井戸の隙間に挟まってるんだな。","湿度が100%超えてる気がするんだな。","何かいいこと、あるわけないんだな。","今日も一歩も動いてない……最高かもね。","影と喋るのが一番疲れいないんだな。","僕を外に出そうなんて、思わないでほしいんだな。","肺が苔になりそうなんだな。","頑張るって、どういう意味だったっけ……。","誰かが石を投げた……頭に当たればよかったかもね。","暗闇は友達だけど、たまに無視されるんだな。","井戸の底が、僕の全宇宙なんだな。","思考が停止してる時が、一番幸せかもね。","呼吸するのも面倒になってきたんだな。","バケツが降りてきても、乗らないんだな。","空が丸いって、誰が決めたんだな。","幸せな人の声が、遠くで響いてて不快なんだな。","僕はただの餅の塊なんだな。","逃げ場所がここしかないんだな。","笑顔の練習、10年前にやめたんだな。","重力がここでは3倍くらいある気がするんだな。","世界が滅びても、ここは静かだろうな。","「大丈夫」って言葉、呪いみたいなんだな。","カビが生えてきた。おしゃれかもね。","下には下がいるっていうけど、僕が最下層なんだな。","どん底って、意外と安定感があるんだな。","僕は役立たずのプロなんだな。","努力は裏切るけど、絶望は裏切らないんだな。","立ち上がる理由が見つからないんだな。","考えるのをやめると、体が軽くなる気がするんだな。","僕のこと、忘れてくれていいんだな。","向上心？そんなの、地上に置いてきたんだな。","変化はいらない。ずっとこのままでいいんだな。","「生きてるだけで偉い」とか、聞き飽きたんだな。","何もしないのが、僕にできる唯一の貢献なんだな。","孤独は寂しいけど、誰かといるのは苦しいんだな。","眠るのが、一番の娯楽かもね。","起きた瞬間から、寝る時のこと考えてるんだな。","進歩がないのが、僕の取り柄なんだな。","現実は、いつも湿ってて冷たいんだな。","言葉にするのも、疲れるんだな。","静寂だけが、僕を裏切らないんだな。","もう、放っておいてほしいんだな。","ああ、また一言喋っちゃった。無駄遣いなんだな。","これで終わり……やっと黙れるんだな。","幸せになりたいなんて、贅沢なんだな。","僕はただの、息をしてるだけのゴミかもね。"];
const GCMT=["片付けても無駄なんだな…","どうせまた散らかるんだな…","掃除って、誰得なんだな。","疲れた…もうやめたいんだな。","ガラクタは友達だったんだな。"];
const MOODS=['ネガティブ中','暗澹とした','どん底気分','ふさいでいる','やる気皆無'];
const MNLG=['…静かなんだな。','水の音がするんだな。','暗くて気持ちいいんだな。','誰も来ないかもね。','底は深いんだな。','ぐしょぐしょしてるんだな。'];
function rnd(a){return a[Math.floor(Math.random()*a.length)];}

/* DOM */
const charWrap=document.getElementById('char-wrap');
const imgA=document.getElementById('char-img-a'), imgB=document.getElementById('char-img-b');
const zzzFx=document.getElementById('zzz-fx');
const charShadow=document.getElementById('char-shadow-el');
const charClickZone=document.getElementById('char-click-zone');
const bubble=document.getElementById('bubble');
const clickFxWrap=document.getElementById('click-fx');
const fxCanvas=document.getElementById('fx-canvas');
const statusLine=document.getElementById('status-line');
const promptInput=document.getElementById('prompt-input');
const sendBtn=document.getElementById('send-btn');
const moodTxt=document.getElementById('mood-txt');
const actionBadge=document.getElementById('action-badge');
const taroMini=document.getElementById('taro-mini');
const taroGC=document.getElementById('taro-gc');

let bubbleTimer=null, isThinking=false, isDragging=false, lastPD=0;
const chatHistory=[];
let frontImg=imgA, backImg=imgB;
let activeSprite=SP.front;
let currentMode='normal';
let lifeReturnTimer=null;
let gcTimer=null, gcIdx=0;
let moveTarget=null, manualBoost=0;

/* ════ クロスフェード ════ */
function crossFade(src, cb){
  if(activeSprite===src){if(cb)cb();return;}
  backImg.src=src;
  gsap.set(backImg,{opacity:0,zIndex:12});
  gsap.set(frontImg,{zIndex:11});
  gsap.to(backImg,{opacity:1,duration:0.5,ease:'power1.inOut',onComplete:()=>{
    gsap.set(frontImg,{opacity:0});
    [frontImg,backImg]=[backImg,frontImg];
    activeSprite=src; if(cb)cb();
  }});
}

/* ════ 生活モード管理 ════ */
let idleSpTimer=null;
function startIdleSpriteCycle(){
  stopIdleSpriteCycle();
  // 通常時：3〜7秒おきにランダムスプライト
  function cycle(){
    if(currentMode!=='normal')return;
    const s=rnd(NORMAL_SP);
    if(activeSprite!==s) crossFade(s);
    idleSpTimer=setTimeout(cycle,3000+Math.random()*4000);
  }
  idleSpTimer=setTimeout(cycle,4000);
}
function stopIdleSpriteCycle(){clearTimeout(idleSpTimer);idleSpTimer=null;}

function applyLifeMode(m){
  currentMode=m.key;
  stopIdleSpriteCycle();
  if(lifeReturnTimer)clearTimeout(lifeReturnTimer);
  crossFade(m.sprite);
  actionBadge.textContent=m.badge; actionBadge.classList.add('show');
  statusLine.textContent=m.status;
  moodTxt.textContent=rnd(MOODS);
  showBubble(rnd(m.lines),7000);
  if(m.key==='zzz'){
    gsap.to(zzzFx,{opacity:1,duration:.6});
    gsap.to(zzzFx,{y:-28,duration:2.4,ease:'sine.inOut',yoyo:true,repeat:-1});
  }else{
    gsap.killTweensOf(zzzFx);gsap.to(zzzFx,{opacity:0,y:0,duration:.4});
  }
  // 10〜20秒後に通常へ戻る
  const delay=(10+Math.random()*10)*1000;
  lifeReturnTimer=setTimeout(returnToNormal,delay);
}

function returnToNormal(){
  currentMode='normal';
  if(lifeReturnTimer)clearTimeout(lifeReturnTimer);
  gsap.killTweensOf(zzzFx);gsap.to(zzzFx,{opacity:0,y:0,duration:.3});
  crossFade(SP.front,()=>startIdleSpriteCycle());
  actionBadge.textContent='[ 通常観測中 ]';
  statusLine.textContent='✅ クリックすると反応するんだな。';
  moodTxt.textContent='ネガティブ中';
}

/* ════ パーティクル ════ */
const pCtx=fxCanvas.getContext('2d'); let cW,cH;
function resizeCv(){cW=fxCanvas.width=innerWidth;cH=fxCanvas.height=innerHeight;}resizeCv();
class Ptcl{constructor(){this.r2(true)}r2(i=false){this.x=Math.random()*cW;this.y=i?Math.random()*cH:cH+12;this.vx=(Math.random()-.5)*.1;this.vy=-(0.12+Math.random()*.38);this.r=.7+Math.random()*2;this.a=.07+Math.random()*.22;this.l=0;this.m=200+Math.random()*320;this.g=Math.random()<.3;}
tick(){this.x+=this.vx;this.y+=this.vy;this.l++;if(this.l>this.m||this.y<-12)this.r2();}
draw(){const p=this.l/this.m,a=this.a*(p<.15?p/.15:p>.82?(1-p)/.18:1);if(this.g){const g=pCtx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*5);g.addColorStop(0,`rgba(70,170,255,${a})`);g.addColorStop(1,'rgba(0,0,0,0)');pCtx.fillStyle=g;pCtx.beginPath();pCtx.arc(this.x,this.y,this.r*5,0,Math.PI*2);pCtx.fill();}else{pCtx.fillStyle=`rgba(130,195,255,${a*.65})`;pCtx.beginPath();pCtx.arc(this.x,this.y,this.r,0,Math.PI*2);pCtx.fill();}}}
const ptcls=Array.from({length:80},()=>new Ptcl());
function dFX(){pCtx.clearRect(0,0,cW,cH);ptcls.forEach(p=>{p.tick();p.draw();});requestAnimationFrame(dFX);}dFX();
setInterval(()=>{const el=document.createElement('div');el.className='drop';const s=3+Math.random()*7,d=1+Math.random()*2.2;el.style.cssText=`left:${10+Math.random()*(innerWidth-20)}px;top:-10px;width:${s}px;height:${s*1.5}px;animation-duration:${d}s`;document.body.appendChild(el);setTimeout(()=>el.remove(),d*1000+300);},300);

/* ════ Matter.js ════ */
const{Engine,Render,Runner,Bodies,Body,Composite,Mouse,MouseConstraint,Events,Vector}=Matter;
const engine=Engine.create();engine.gravity.y=0.18;
const physCv=document.createElement('canvas');physCv.style.cssText='position:fixed;inset:0;opacity:0;pointer-events:none;z-index:-1';document.body.appendChild(physCv);
const mRender=Render.create({element:document.body,canvas:physCv,engine,options:{width:innerWidth,height:innerHeight,wireframes:false,background:'transparent',pixelRatio:1}});
let walls=[];
function buildWalls(){walls.forEach(w=>Composite.remove(engine.world,w));const W=innerWidth,H=innerHeight;walls=[Bodies.rectangle(W/2,H+100,W*3,200,{isStatic:true}),Bodies.rectangle(W/2,-100,W*3,200,{isStatic:true}),Bodies.rectangle(-100,H/2,200,H*3,{isStatic:true}),Bodies.rectangle(W+100,H/2,200,H*3,{isStatic:true})];Composite.add(engine.world,walls);}buildWalls();
const charBody=Bodies.circle(innerWidth/2,innerHeight*.5,52,{restitution:.92,friction:.015,frictionAir:.025,density:.0012,slop:.04,render:{visible:false}});Composite.add(engine.world,charBody);
const mouse=Mouse.create(document.body);const mc=MouseConstraint.create(engine,{mouse,constraint:{stiffness:.08,angularStiffness:.1,render:{visible:false}}});Composite.add(engine.world,mc);
Events.on(mc,'startdrag',e=>{if(e.body===charBody)isDragging=true;});
Events.on(mc,'enddrag',()=>{isDragging=false;});
Render.run(mRender);Runner.run(Runner.create(),engine);

let walkTick=0,jumpCooldown=0;
Events.on(engine,'beforeUpdate',()=>{
  const W=innerWidth,H=innerHeight;walkTick+=.095;jumpCooldown--;
  const toC=Vector.sub({x:W*.5,y:H*.52},charBody.position);
  Body.applyForce(charBody,charBody.position,{x:toC.x*.000011,y:toC.y*.000011-.00068});
  if(moveTarget){
    const to=Vector.sub(moveTarget,charBody.position),dist=Math.hypot(to.x,to.y);
    if(dist<16){moveTarget=null;manualBoost=0;}
    else{const nx=to.x/dist,ny=to.y/dist,sp=Math.min(dist/160,1.4);manualBoost=Math.min(manualBoost+.05,1);const fm=.0018*sp*(.8+manualBoost*.6);Body.applyForce(charBody,charBody.position,{x:nx*fm,y:ny*fm*.85});if(jumpCooldown<=0&&dist>80&&Math.random()<.045){Body.applyForce(charBody,charBody.position,{x:nx*.0012,y:-.018-Math.random()*.005});jumpCooldown=25+Math.random()*12;}}
  }else{
    manualBoost=Math.max(manualBoost-.03,0);
    const sw=Math.sin(walkTick)*.00058+Math.sin(walkTick*.4)*.00024;
    Body.applyForce(charBody,charBody.position,{x:sw,y:Math.sin(walkTick*.52)*.00007});
    if(jumpCooldown<=0&&Math.random()<.014){Body.applyForce(charBody,charBody.position,{x:(Math.random()-.5)*2*.0015,y:-.022-Math.random()*.007});jumpCooldown=50+Math.random()*40;}
  }
  const{x,y}=charBody.position,pad=72;
  if(x<pad)Body.setVelocity(charBody,{x:Math.abs(charBody.velocity.x)*.9+1.1,y:charBody.velocity.y});
  if(x>W-pad)Body.setVelocity(charBody,{x:-Math.abs(charBody.velocity.x)*.9-1.1,y:charBody.velocity.y});
  if(y<pad)Body.setVelocity(charBody,{x:charBody.velocity.x,y:Math.abs(charBody.velocity.y)*.9+.9});
  if(y>H-pad)Body.setVelocity(charBody,{x:charBody.velocity.x,y:-Math.abs(charBody.velocity.y)*.9-1.2});
});

let pSpr=SP.front,sHold=0; const SHOLD=4;
Events.on(engine,'afterUpdate',()=>{
  const{x,y}=charBody.position,vx=charBody.velocity.x,vy=charBody.velocity.y;
  const t=performance.now()*.001,idle=Math.abs(vx)<.4&&Math.abs(vy)<.4;
  charWrap.style.left=x+'px';charWrap.style.top=y+'px';
  const tY=Math.max(-14,Math.min(14,vx*2.2)),tX=Math.max(-12,Math.min(12,-vy*1.8));
  const sw=idle?Math.sin(t*2.1)*2.2:Math.sin(t*8)*Math.min(Math.abs(vx)*.4,2.8);
  const lf=idle?Math.sin(t*1.9)*4.8:Math.sin(t*8.5)*Math.min(Math.abs(vy)*.3,3.5);
  const sx=1+Math.min(Math.abs(vx)*.014,.1),sy=1-Math.min(Math.abs(vx)*.008+Math.abs(vy)*.006,.1);
  charWrap.style.transform=`translate(-50%,-50%) rotate(${charBody.angle*.16+sw*.028}rad)`;
  frontImg.style.transform=`translate(-50%,calc(-50% + ${lf}px)) perspective(900px) rotateX(${tX}deg) rotateY(${tY}deg) rotate(${sw*.36}deg) scaleX(${sx}) scaleY(${sy})`;
  const ss=Math.max(.65,Math.min(1.05,1-Math.abs(y-innerHeight*.55)/900));
  charShadow.style.transform=`translateX(-50%) scale(${ss})`;charShadow.style.opacity=Math.max(.3,Math.min(.85,.85-Math.abs(vy)*.022));
  // 通常時のみ方向スプライト（ただし idleSpriteCycle が上書きするので移動中のみ）
  if(currentMode==='normal'&&(Math.abs(vx)>.8||Math.abs(vy)>.8)){
    let nxt=SP.front;const ax=Math.abs(vx),ay=Math.abs(vy);
    if(moveTarget){const dx=moveTarget.x-x,dy=moveTarget.y-y;if(Math.abs(dy)>Math.abs(dx)*.8)nxt=dy<0?SP.up:SP.down;else nxt=dx>0?SP.right:SP.left;}
    else if(ay>ax*1.1&&ay>.5)nxt=vy<0?SP.up:SP.down;else if(ax>.5)nxt=vx>0?SP.right:SP.left;
    if(nxt===pSpr){sHold++;}else{pSpr=nxt;sHold=0;}
    if(activeSprite!==pSpr&&sHold>=SHOLD)crossFade(pSpr);
  }
});
function doBlink(){gsap.timeline().to(frontImg,{scaleY:.07,duration:.06,ease:'power2.in'}).to(frontImg,{scaleY:1,duration:.1,ease:'power2.out'}).call(()=>setTimeout(doBlink,2200+Math.random()*4000));}
setTimeout(doBlink,2000);

/* ════ 吹き出し ════ */
function showBubble(t,d=10000){bubble.textContent=t;bubble.classList.add('show');if(bubbleTimer)clearTimeout(bubbleTimer);bubbleTimer=setTimeout(()=>bubble.classList.remove('show'),d);}

function spawnClickFX(x,y){['cfx','cfx2'].forEach(c=>{const e=document.createElement('div');e.className=c;e.style.left=x+'px';e.style.top=y+'px';clickFxWrap.appendChild(e);setTimeout(()=>e.remove(),c==='cfx'?780:450);});}
function spawnBurst(x,y){for(let i=0;i<10;i++){const d=document.createElement('div'),a=(i/10)*Math.PI*2,r=22+Math.random()*35;d.style.cssText=`position:fixed;width:${3+Math.random()*3|0}px;height:${3+Math.random()*3|0}px;border-radius:50%;left:${x}px;top:${y}px;transform:translate(-50%,-50%);pointer-events:none;z-index:16;background:rgba(${100+Math.random()*80|0},${180+Math.random()*60|0},255,.88);box-shadow:0 0 8px rgba(80,180,255,.7)`;document.body.appendChild(d);gsap.to(d,{x:Math.cos(a)*r,y:Math.sin(a)*r,opacity:0,duration:.45+Math.random()*.25,ease:'power2.out',onComplete:()=>d.remove()});}}
function showGC(msg){taroGC.textContent=msg;taroGC.classList.add('show');taroMini.classList.add('show');if(gcTimer)clearTimeout(gcTimer);gcTimer=setTimeout(()=>{taroGC.classList.remove('show');taroMini.classList.remove('show');},3000);}

/* ════ キャラクタークリック（生活モード移行） ════ */
charClickZone.addEventListener('click',(e)=>{
  e.stopPropagation();
  spawnClickFX(e.clientX,e.clientY);
  if(currentMode!=='normal'){
    // 生活モード中クリックは専用セリフ
    const m=LIFE_MODES.find(x=>x.key===currentMode);
    if(m) showBubble(rnd(m.lines),4000);
    // ぷよん
    Body.applyForce(charBody,charBody.position,{x:0,y:-.008});
    gsap.timeline().to(frontImg,{scaleX:1.18,scaleY:.84,duration:.1,ease:'power3.out'}).to(frontImg,{scaleX:1,scaleY:1,duration:.7,ease:'elastic.out(1.2,.4)'});
    return;
  }
  // 通常時：40%で生活モード移行
  if(Math.random()<.40){
    const m=rnd(LIFE_MODES);
    applyLifeMode(m);
  }else{
    // 通常リアクション
    Body.applyForce(charBody,charBody.position,{x:(Math.random()-.5)*.0008,y:-.012});
    gsap.timeline().to(frontImg,{scaleX:1.22,scaleY:.80,duration:.1,ease:'power3.out'}).to(frontImg,{scaleX:.9,scaleY:1.18,duration:.14,ease:'power2.out'}).to(frontImg,{scaleX:1,scaleY:1,duration:.65,ease:'elastic.out(1.2,.4)'});
    spawnBurst(e.clientX,e.clientY);
    showBubble(rnd(taroQ),5000);
    moodTxt.textContent=rnd(MOODS);
  }
});

/* 背景クリック→移動 */
document.addEventListener('pointerdown',e=>{lastPD=performance.now();});
document.addEventListener('pointerup',e=>{
  const held=performance.now()-lastPD;
  const t=e.target;
  if(t.closest('#composer')||t.closest('#top-bar')||t.closest('.game-overlay')||t.closest('#game-menu')||t.closest('#char-click-zone'))return;

async function handleSend(){
  const text=promptInput.value.trim();if(!text||isThinking)return;
  if(currentMode==='zzz')returnToNormal();
  promptInput.value='';autoResize();isThinking=true;sendBtn.disabled=true;
  showBubble('……考えてるんだな。',8000);
  const shk=gsap.to(frontImg,{x:2,duration:.08,yoyo:true,repeat:-1,ease:'none'});
  try{
    chatHistory.push({role:'user',text});
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history:chatHistory.slice(-8)})});
    const data=await res.json().catch(()=>({}));
    if(!res.ok)throw new Error(data?.error||'サーバーエラー');
    const reply=(data?.reply||'').trim()||'……なんだな。';
    chatHistory.push({role:'model',text:reply});shk.kill();gsap.set(frontImg,{x:0});
    showBubble(reply);moodTxt.textContent=rnd(MOODS);
    Body.applyForce(charBody,charBody.position,{x:0,y:-.022});
  }catch(err){shk.kill();gsap.set(frontImg,{x:0});showBubble(`うまく喋れないんだな… ${err.message}`);}
  finally{isThinking=false;sendBtn.disabled=false;}
}

function startMoss(){
  mossScore=0;mossLives=3;mossRunning=true;mossItems=[];mossFrame=0;mossSpawnRate=80;

function mossTick(){
  if(!mossRunning){mossCtx.clearRect(0,0,MOSSW,MOSSH);return;}
  mossFrame++;

  if(mossKeys['ArrowLeft']||mossKeys['a'])mossVX-=.8;

  mossItems=mossItems.filter(it=>{

    if(it.y>MOSSH+40) return false;
    const dx=Math.abs(it.x-mossPlayerX),dy=Math.abs(it.y-(MOSSH-34));
    if(dx<32&&dy<28){
      if(it.bad){mossLives--;if(mossLives<=0){mossOver();return false;}spawnClickFX(mossCV.getBoundingClientRect().left+mossPlayerX,mossCV.getBoundingClientRect().top+MOSSH-34);}

  mossCtx.fillStyle=bg;mossCtx.fillRect(0,0,MOSSW,MOSSH);

  mossCtx.font='38px serif';mossCtx.textAlign='center';

  mossItems.forEach(it=>{

  requestAnimationFrame(mossTick);
}

const rShaft=document.getElementById('rhythm-shaft');
const rEcho=document.getElementById('rhythm-echo');
let rRunning=false,rScore=0,rCombo=0,rBestCombo=0,rHiScore=0;
let rDrops=[],rFrame=0,rSpawnTimer=null;
const SHAFT_W=280,SHAFT_HH=320,HIT_Y=SHAFT_HH-52,HIT_RANGE=30;
let rAnimId=null;

function startRhythm(){
  rRunning=true;rScore=0;rCombo=0;rDrops=[];rFrame=0;
  clearTimeout(rSpawnTimer);scheduleRhythmDrop();
  if(rAnimId)cancelAnimationFrame(rAnimId);
  rLoop();
  document.getElementById('r-start').textContent='リセット';
}
function scheduleRhythmDrop(){
  if(!rRunning)return;
  const delay=600+Math.random()*1400;
  rSpawnTimer=setTimeout(()=>{
    rDrops.push({x:40+Math.random()*(SHAFT_W-80),y:-10,vy:1.8+Math.random()*.8,r:8+Math.random()*6,hit:false,miss:false,age:0});
    scheduleRhythmDrop();
  },delay);
}
function rLoop(){
  rFrame++;
  rDrops.forEach(d=>{d.y+=d.vy;d.age++;if(d.y>SHAFT_HH+20&&!d.hit){d.miss=true;}});
  rDrops=rDrops.filter(d=>{
    if(d.miss&&d.age>30){if(d.hit===false){rCombo=0;updateRhythmUI();}return false;}
    return d.y<SHAFT_HH+30;
  });
  renderRhythm();
  if(rRunning)rAnimId=requestAnimationFrame(rLoop);
}
function renderRhythm(){
  // CSS-based: draw with DOM isn't ideal, use canvas approach in shaft
  // Already using DOM shaft — skip canvas, just update existing r-drops
  // Clear old drop divs
  rShaft.querySelectorAll('.r-drop').forEach(e=>e.remove());
  rDrops.forEach(d=>{
    const el=document.createElement('div');el.className='r-drop';
    const col=d.hit?'rgba(120,255,180,.9)':'rgba(80,180,255,.85)';
    el.style.cssText=`left:${d.x}px;top:${d.y}px;width:${d.r*2}px;height:${d.r*2}px;background:${col};transform:translate(-50%,-50%);box-shadow:0 0 ${d.r+4}px ${col}`;
    rShaft.appendChild(el);
  });
}
function doRhythmTap(){
  if(!rRunning)return;
  // 当たり判定
  let hit=false;
  for(const d of rDrops){
    if(d.hit)continue;
    if(d.y>HIT_Y-HIT_RANGE&&d.y<HIT_Y+HIT_RANGE){
      d.hit=true;hit=true;rCombo++;rScore+=10*Math.max(1,Math.floor(rCombo/3));
      rBestCombo=Math.max(rBestCombo,rCombo);rHiScore=Math.max(rHiScore,rScore);
      // エコー演出
      gsap.fromTo(rEcho,{opacity:1,scale:.5},{opacity:0,scale:2,duration:.6,ease:'power2.out'});
      break;
    }
  }
  if(!hit){rCombo=0;}
  updateRhythmUI();
  spawnClickFX(rShaft.getBoundingClientRect().left+SHAFT_W/2,rShaft.getBoundingClientRect().top+HIT_Y);
}
function updateRhythmUI(){
  document.getElementById('r-combo').textContent=rCombo;
  document.getElementById('r-score').textContent=rScore;
  document.getElementById('r-best').textContent=rBestCombo;
  document.getElementById('r-hi').textContent=rHiScore;
}
document.getElementById('rhythm-btn').addEventListener('click',doRhythmTap);
document.getElementById('rhythm-btn').addEventListener('keydown',e=>{if(e.key===' ')doRhythmTap();});
document.getElementById('r-start').addEventListener('click',startRhythm);

/* ══════════════════════════════════════════════════
   四川省（完全二角取り版）
══════════════════════════════════════════════════ */
const EMOJIS=['🦴','🧱','🍄','👞','📻','🪣','🕳️','🦎','🐛','🕸️','🍂','🔩'];
const COLS=6,ROWS=4,TILE=54,GAP=5;
const mjBoard=document.getElementById('mahjong-board');
const mjLC=document.getElementById('mj-line-canvas');
const mjLCtx=mjLC.getContext('2d');
let gB=[],tEls=[],gSel=null,gMv=40;

function gEmpty(r,c){if(r<0||r>=ROWS||c<0||c>=COLS)return true;return gB[r*COLS+c]<0;}
function gClearRow(r,c1,c2){const lo=Math.min(c1,c2)+1,hi=Math.max(c1,c2);for(let c=lo;c<hi;c++)if(!gEmpty(r,c))return false;return true;}
function gClearCol(c,r1,r2){const lo=Math.min(r1,r2)+1,hi=Math.max(r1,r2);for(let r=lo;r<hi;r++)if(!gEmpty(r,c))return false;return true;}
function gFindPath(i1,i2){
  if(i1===i2||gB[i1]!==gB[i2])return null;
  const r1=Math.floor(i1/COLS),c1=i1%COLS,r2=Math.floor(i2/COLS),c2=i2%COLS;
  if(r1===r2&&gClearRow(r1,c1,c2))return[[r1,c1],[r2,c2]];
  if(c1===c2&&gClearCol(c1,r1,r2))return[[r1,c1],[r2,c2]];
  if(gEmpty(r1,c2)&&gClearRow(r1,c1,c2)&&gClearCol(c2,r1,r2))return[[r1,c1],[r1,c2],[r2,c2]];
  if(gEmpty(r2,c1)&&gClearCol(c1,r1,r2)&&gClearRow(r2,c1,c2))return[[r1,c1],[r2,c1],[r2,c2]];
  for(let r=-1;r<=ROWS;r++){if(!gEmpty(r,c1)||!gEmpty(r,c2))continue;if(gClearCol(c1,r1,r)&&gClearRow(r,c1,c2)&&gClearCol(c2,r,r2))return[[r1,c1],[r,c1],[r,c2],[r2,c2]];}
  for(let c=-1;c<=COLS;c++){if(!gEmpty(r1,c)||!gEmpty(r2,c))continue;if(gClearRow(r1,c1,c)&&gClearCol(c,r1,r2)&&gClearRow(r2,c,c2))return[[r1,c1],[r1,c],[r2,c],[r2,c2]];}
  return null;
}
function gTileCenter(r,c){return{x:c*(TILE+GAP)+TILE/2,y:r*(TILE+GAP)+TILE/2};}
function gDrawPath(path){
  mjLCtx.clearRect(0,0,mjLC.width,mjLC.height);if(!path||path.length<2)return;
  mjLCtx.beginPath();const s=gTileCenter(path[0][0],path[0][1]);mjLCtx.moveTo(s.x,s.y);
  for(let i=1;i<path.length;i++){const p=gTileCenter(path[i][0],path[i][1]);mjLCtx.lineTo(p.x,p.y);}
  mjLCtx.strokeStyle='rgba(100,215,255,.92)';mjLCtx.lineWidth=3;mjLCtx.lineCap='round';mjLCtx.lineJoin='round';mjLCtx.shadowColor='rgba(80,195,255,.75)';mjLCtx.shadowBlur=10;mjLCtx.stroke();mjLCtx.shadowBlur=0;
}
function gFindHint(){for(let i=0;i<ROWS*COLS-1;i++){if(gB[i]<0)continue;for(let j=i+1;j<ROWS*COLS;j++){if(gB[j]<0)continue;if(gB[i]===gB[j]&&gFindPath(i,j))return[i,j];}}return null;}
function gMakeBoard(){const t=[];for(let i=0;i<12;i++)t.push(i,i);for(let i=t.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[t[i],t[j]]=[t[j],t[i]];}gB=t.slice();}
function gRender(){
  const bw=COLS*(TILE+GAP)-GAP,bh=ROWS*(TILE+GAP)-GAP;
  mjBoard.style.gridTemplateColumns=`repeat(${COLS},${TILE}px)`;
  mjLC.width=bw;mjLC.height=bh;mjLCtx.clearRect(0,0,bw,bh);
  tEls.forEach(e=>e.remove());tEls=[];
  gB.forEach((v,idx)=>{const el=document.createElement('div');el.className='tile'+(v<0?' empty':'');el.textContent=v>=0?EMOJIS[v%EMOJIS.length]:'';if(v>=0)el.addEventListener('click',()=>gOnTile(idx));mjBoard.appendChild(el);tEls.push(el);});
  gUpdateInfo();
}
function gUpdateInfo(){document.getElementById('mj-moves').textContent=gMv;document.getElementById('mj-pairs').textContent=gB.filter(v=>v>=0).length/2|0;}
function gClearHint(){tEls.forEach(e=>e.style.boxShadow='');}
function gOnTile(idx){
  if(gB[idx]<0)return;
  if(gSel===null){gSel=idx;tEls[idx].classList.add('selected');gClearHint();return;}
  if(gSel===idx){tEls[idx].classList.remove('selected');gSel=null;mjLCtx.clearRect(0,0,mjLC.width,mjLC.height);return;}
  const path=gFindPath(gSel,idx);
  if(path){
    gDrawPath(path);const s=gSel,t=idx;gSel=null;gMv--;
    tEls[s].classList.add('flash');tEls[t].classList.add('flash');
    setTimeout(()=>{gB[s]=-1;gB[t]=-1;tEls[s].textContent='';tEls[s].className='tile empty';tEls[t].textContent='';tEls[t].className='tile empty';mjLCtx.clearRect(0,0,mjLC.width,mjLC.height);gUpdateInfo();gCheckEnd();showGC(rnd(GCMT));},420);
  }else{tEls[gSel].classList.remove('selected');gSel=idx;tEls[idx].classList.add('selected');mjLCtx.clearRect(0,0,mjLC.width,mjLC.height);document.getElementById('mj-msg').textContent='繋がらないんだな……。';setTimeout(()=>document.getElementById('mj-msg').textContent='同じガラクタを2曲がり以内で結んで消すんだな。',1400);}
}
function gCheckEnd(){if(gB.every(v=>v<0)){document.getElementById('mj-msg').textContent='全部消えたんだな。……虚しいかもね。';return;}if(gMv<=0){document.getElementById('mj-msg').textContent='手数切れなんだな…。';return;}if(!gFindHint())document.getElementById('mj-msg').textContent='もう消せるペアがないんだな…。';}
function gStart(){gMv=40;gSel=null;gMakeBoard();gRender();gClearHint();document.getElementById('mj-msg').textContent='同じガラクタを2曲がり以内で結んで消すんだな。';}

document.getElementById('btn-mahjong').addEventListener('click',()=>{openOverlay('mahjong-overlay');gStart();setTimeout(()=>showGC(rnd(GCMT)),600);});
document.getElementById('mj-close').addEventListener('click',()=>closeOverlay('mahjong-overlay'));
document.getElementById('mj-reset').addEventListener('click',gStart);
document.getElementById('mj-hint').addEventListener('click',()=>{gClearHint();const p=gFindHint();if(!p){document.getElementById('mj-msg').textContent='消せるペアがないんだな。';return;}tEls[p[0]].style.boxShadow='0 0 16px 4px rgba(255,220,80,.85)';tEls[p[1]].style.boxShadow='0 0 16px 4px rgba(255,220,80,.85)';document.getElementById('mj-msg').textContent='黄色く光ってるやつなんだな。';setTimeout(gClearHint,2800);});

document.getElementById('btn-moss').addEventListener('click',()=>{openOverlay('moss-overlay');});
document.getElementById('btn-climb').addEventListener('click',()=>{openOverlay('climb-overlay');});
document.getElementById('btn-junk').addEventListener('click',()=>{openOverlay('junk-overlay');nextJunk();});
document.getElementById('btn-rhythm').addEventListener('click',()=>{openOverlay('rhythm-overlay');});
document.getElementById('climb-close').addEventListener('click',()=>{mossRunning=false;closeOverlay('climb-overlay');});
document.getElementById('junk-close').addEventListener('click',()=>closeOverlay('junk-overlay'));
document.getElementById('rhythm-close').addEventListener('click',()=>{rRunning=false;clearTimeout(rSpawnTimer);cancelAnimationFrame(rAnimId);closeOverlay('rhythm-overlay');});

/* ════ 起動 ════ */
crossFade(SP.front);
startIdleSpriteCycle();
setTimeout(()=>showBubble('どん底井戸太郎なんだな。クリックすると何か起こるかもね。',8000),700);
statusLine.textContent='✅ キャラクターをクリックすると反応するんだな。';
setInterval(()=>{if(!isThinking&&!bubble.classList.contains('show'))showBubble(rnd(MNLG),5500);},22000);

})();
</script>
